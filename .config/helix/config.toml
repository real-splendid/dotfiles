# theme = "nord"
# theme = "autumn"
# theme = "sonokai"
# theme = "default"
theme = "everforest_dark"

[editor]
true-color = true
color-modes = true
line-number = "relative"

[editor.whitespace.render]
tab = "all"

[editor.cursor-shape]
insert = "bar"

# At most one section each of 'keys.normal', 'keys.insert' and 'keys.select'
[keys.normal]
"р" = "move_char_left"
"о" = "move_line_down"
"л" = "move_line_up"
"д" = "move_char_right"
F5 = [":w", ":sh tmux send-keys -t .2 Up Enter"]
F12 = ":config-open"

[keys.normal.space]
"space" = "command_palette"
c = "toggle_comments"
q = ":q"
w = ":w"
r = ":sh php7.4 fizz.php"

[keys.insert.j]
j = "normal_mode"
# j = ":insert-output printf 'j'"
